---
- name: Log into Docker registry
  docker_login:
    registry: "{{ openbao_registry_url }}"
    username: "{{ openbao_registry_username }}"
    password: "{{ openbao_registry_password }}"
  when: openbao_registry_username | length > 0
  become: true

- name: Get information of the Vault
  ansible.builtin.uri:
    url: "http://127.0.0.1:8200/v1/sys/ha-status"
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
  run_once: true
  register: ha_status_query
  when: vault_raft_leader is undefined or vault_raft_leader == ""

- name: Set Vault leader as fact
  ansible.builtin.set_fact:
    vault_raft_leader: "{{ (ha_status_query.json.nodes | selectattr('active_node', 'equalto', true) | first).hostname }}"
    vault_leader_api_addr: "{{ (ha_status_query.json.nodes | selectattr('active_node', 'equalto', true) | first).api_address }}"
  when: vault_raft_leader is undefined or vault_raft_leader == ""

- name: Set Vault followers as fact
  ansible.builtin.set_fact:
    vault_raft_followers: "{{ ha_status_query.json.nodes | selectattr('active_node', 'equalto', false) | map(attribute='hostname') | list }}"
  when: vault_raft_followers | length == 0
