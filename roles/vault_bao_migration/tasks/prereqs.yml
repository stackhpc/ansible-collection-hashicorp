---
- name: Log into Docker registry
  docker_login:
    registry: "{{ migration_openbao_registry_url }}"
    username: "{{ migration_openbao_registry_username }}"
    password: "{{ migration_openbao_registry_password }}"
  when: migration_openbao_registry_username | length > 0
  become: true

- name: Get information of the Vault
  ansible.builtin.uri:
    url: "http://127.0.0.1:8200/v1/sys/ha-status"
    headers:
      X-Vault-Token: "{{ migration_common_root_token }}"
  run_once: true
  register: ha_status_query
  when: _vault_leader is undefined or _vault_leader == ""

- name: Set Vault leader as fact
  ansible.builtin.set_fact:
    _vault_leader: "{{ (ha_status_query.json.nodes | selectattr('active_node', 'equalto', true) | first).hostname }}"
    _vault_leader_api_addr: "{{ (ha_status_query.json.nodes | selectattr('active_node', 'equalto', true) | first).api_address }}"
  when: _vault_leader is undefined or _vault_leader == ""

- name: Set Vault followers as fact
  ansible.builtin.set_fact:
    _vault_followers: "{{ ha_status_query.json.nodes | selectattr('active_node', 'equalto', false) | map(attribute='hostname') | list }}"
  when: _vault_followers | length == 0
